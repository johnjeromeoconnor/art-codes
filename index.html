                        shapeBehaviorMode = 'drift';
                    }
                    if (shapeBehaviorMode === 'converge') {
                        globalThis.convergencePoint = {
                            x: canvasCenterX + randomFloat(-canvas.width * 0.2, canvas.width * 0.2),
                            y: canvasCenterY + randomFloat(-canvas.height * 0.3, canvas.height * 0.1)
                        };
                    }
                    generateNewTargetPointSet();
                }
            }
        }

        function generateNewTargetPointSet() {
            if (shapeBehaviorLock) return;
            if (isFlashing) return;

            const smallerDim = Math.min(canvas.width, canvas.height);
            const minActiveX = canvas.width * ACTIVE_AREA_PADDING_X_PERCENT;
            const maxActiveX = canvas.width * (1 - ACTIVE_AREA_PADDING_X_PERCENT);
            const minActiveY = canvas.height * ACTIVE_AREA_TOP_Y_PERCENT;
            const maxY = canvas.height * ACTIVE_AREA_BOTTOM_Y_PERCENT;

            for (let i = 0; i < currentNumShapes; i++) {
                const properties = shapeProperties[i];
                const points = currentPoints[i];
                const shapeType = randomInt(0, 5);
                const baseRadius = randomFloat(smallerDim * 0.05, smallerDim * 0.15);
                const zRange = smallerDim * Z_RANGE_FACTOR;
                properties.drawingStyle = Math.random() < 0.5 ? 'angular' : 'curvilinear';
                let baseTargetSpeed = randomFloat(0.4, 2.2);
                properties.targetGlobalMorphSpeedFactor = (Math.random() < 0.20)
                    ? randomFloat(2.5, 4.0)
                    : baseTargetSpeed;

                if (shapeBehaviorMode === 'follow' && leaderShapeIndex !== -1 && i !== leaderShapeIndex && shapeProperties[leaderShapeIndex]) {
                    const leaderProps = shapeProperties[leaderShapeIndex];
                    properties.targetCenterX = leaderProps.currentCenterX + randomFloat(-smallerDim * 0.1, smallerDim * 0.1);
                    properties.targetCenterY = leaderProps.currentCenterY + randomFloat(-smallerDim * 0.1, smallerDim * 0.1);
                    properties.targetScale = randomFloat(1.0, 2.5);
                    properties.centerMoveSpeed = randomFloat(CENTER_MOVE_SPEED_BASE, CENTER_MOVE_SPEED_BASE * 2);
                    properties.targetColorRgb = hexToRgb(getRandomMorphColorHex());
                } else if (shapeBehaviorMode === 'converge') {
                    if (typeof globalThis.convergencePoint === 'undefined') {
                        globalThis.convergencePoint = {x: canvasCenterX, y: canvasCenterY * 0.7};
                    }
                    properties.targetCenterX = globalThis.convergencePoint.x;
                    properties.targetCenterY = globalThis.convergencePoint.y;
                    properties.targetScale = randomFloat(0.8, 1.5);
                    properties.centerMoveSpeed = randomFloat(CENTER_MOVE_SPEED_BASE * 1.5, CENTER_MOVE_SPEED_BASE * 2.5);
                    properties.targetColorRgb = hexToRgb(getRandomMorphColorHex());
                } else {
                    properties.targetCenterX = randomFloat(minActiveX, maxActiveX);
                    properties.targetCenterY = randomFloat(minActiveY, maxY);
                    properties.targetScale = randomFloat(1.0, 2.5);
                    properties.centerMoveSpeed = randomFloat(CENTER_MOVE_SPEED_BASE, CENTER_MOVE_SPEED_BASE * 2);
                    properties.targetColorRgb = hexToRgb(getRandomMorphColorHex());
                }

                properties.targetCenterX = Math.max(minActiveX, Math.min(maxActiveX, properties.targetCenterX));
                properties.targetCenterY = Math.max(minActiveY, Math.min(maxY, properties.targetCenterY));

                for (let j = 0; j < NUM_MORPH_POINTS; j++) {
                    const point = points[j];
                    let targetX, targetY, targetZ;
                    const angle = (j / NUM_MORPH_POINTS) * Math.PI * 2 + randomFloat(-0.2, 0.2);
                    targetZ = randomFloat(-zRange / 2, zRange / 2);
                    switch (shapeType) {
                        case 0: {
                            const phi = Math.acos(-1 + (2 * j) / NUM_MORPH_POINTS);
                            const theta = Math.sqrt(NUM_MORPH_POINTS * Math.PI) * phi;
                            targetX = Math.cos(theta) * Math.sin(phi) * baseRadius;
                            targetY = Math.sin(theta) * Math.sin(phi) * baseRadius;
                            targetZ = Math.cos(phi) * baseRadius * 0.8;
                            break;
                        }
                        case 1: {
                            const rFactor = (j % 2 === 0) ? 1 : randomFloat(0.4, 0.7);
                            targetX = Math.cos(angle) * baseRadius * rFactor;
                            targetY = Math.sin(angle) * baseRadius * rFactor;
                            targetZ = randomFloat(-zRange*0.6, zRange*0.6) * ((j%2 === 0) ? 0.5: 1);
                            break;
                        }
                        case 2:
                            targetX = randomFloat(-baseRadius, baseRadius);
                            targetY = randomFloat(-baseRadius, baseRadius);
                            break;
                        case 3: {
                            const ribbonWidth = baseRadius * 0.3;
                            targetX = Math.cos(angle * 2) * (baseRadius + Math.sin(angle * 5 + time * 0.01) * ribbonWidth);
                            targetY = Math.sin(angle * 3) * (baseRadius + Math.cos(angle * 4 + time * 0.01) * ribbonWidth);
                            targetZ = Math.sin(angle * 2.5) * zRange * 0.6;
                            break;
                        }
                        case 4: {
                            const sides = randomInt(3,6);
                            const internalAngle = (Math.PI * 2) / sides;
                            const pointAngle = Math.floor(j * sides / NUM_MORPH_POINTS) * internalAngle + randomFloat(-internalAngle/5, internalAngle/5);
                            targetX = Math.cos(pointAngle) * baseRadius;
                            targetY = Math.sin(pointAngle) * baseRadius;
                            targetZ = Math.cos(pointAngle * 2) * zRange * 0.5;
                            break;
                        }
                        case 5: {
                            const tiltX = randomFloat(-0.7, 0.7);
                            const tiltY = randomFloat(-0.7, 0.7);
                            const pX = Math.cos(angle) * baseRadius;
                            const pY = Math.sin(angle) * baseRadius;
                            targetX = pX;
                            targetY = pY;
                            targetZ = pX * tiltX + pY * tiltY;
                            break;
                        }
                    }
                    point.targetX = targetX;
                    point.targetY = targetY;
                    point.targetZ = targetZ;
                }
            }
            targetFOV = randomFloat(100, 500);
            targetVanishingPointZ = randomFloat(50, 400);
            lastTargetChangeTime = performance.now();
        }

        // --- Shepard tone ---

        function startShepherdTone() {
            if (!audioCtx) {
                const Ctx = window.AudioContext || window.webkitAudioContext;
                if (!Ctx) return;
                audioCtx = new Ctx();
            }
            stopShepherdTone();

            shepherdOscillators = [];
            const baseFreq = 110;
            const numVoices = 3;
            const maxFreq = 2000;
            let phase = 0;

            for (let i = 0; i < numVoices; i++) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = baseFreq * Math.pow(2, i);
                gain.gain.value = 0.25 / numVoices;
                osc.connect(gain).connect(audioCtx.destination);
                osc.start();
                shepherdOscillators.push({ osc, gain });
            }

            shepherdIntervalId = setInterval(() => {
                if (!audioCtx) return;
                phase += 0.015;
                for (let i = 0; i < shepherdOscillators.length; i++) {
                    const node = shepherdOscillators[i];
                    const osc = node.osc;
                    const factor = (phase + i) % 1;
                    const freq = baseFreq * Math.pow(2, factor * 4);
                    const clamped = Math.min(Math.max(freq, 80), maxFreq);
                    osc.frequency.setValueAtTime(clamped, audioCtx.currentTime);
                }
            }, 50);
        }

        function stopShepherdTone() {
            if (shepherdIntervalId) {
                clearInterval(shepherdIntervalId);
                shepherdIntervalId = null;
            }
            if (!audioCtx) {
                shepherdOscillators = [];
                return;
            }
            const now = audioCtx.currentTime;
            shepherdOscillators.forEach(node => {
                const { osc, gain } = node;
                try {
                    gain.gain.cancelScheduledValues(now);
                    gain.gain.setValueAtTime(gain.gain.value, now);
                    gain.gain.linearRampToValueAtTime(0, now + 1.5);
                    osc.stop(now + 1.6);
                } catch(e){}
            });
            shepherdOscillators = [];
        }

        // --- Cluster phase (big, rotating swarm) ---

        function startClusterPhase() {
            if (clusterToFacePhase) return;
            clusterToFacePhase = true;
            shapeBehaviorLock = true;
            clusterDuration = randomInt(CLUSTER_DURATION_MIN, CLUSTER_DURATION_MAX);
            clusterStartTime = performance.now();

            const minDim = Math.min(canvas.width, canvas.height);

            unifiedConvergencePoint.x = canvasCenterX;
            unifiedConvergencePoint.y = canvasCenterY;

            // Updated: Larger movement range
            targetUnifiedConvergencePoint.x = canvasCenterX + randomFloat(-canvas.width * 0.35, canvas.width * 0.35);
            targetUnifiedConvergencePoint.y = canvasCenterY + randomFloat(-canvas.height * 0.35, canvas.height * 0.35);
            currentUnifiedConvergencePointSpeed = randomFloat(0.01, 0.05);

            const newColor = hexToRgb(getRandomMorphColorHex());
            unifiedShapeColorRgb = {...newColor};
            targetUnifiedShapeColorRgb = {...newColor};
            faceCurrentColorRgb = {...newColor};
            faceTargetColorRgb = hexToRgb(getRandomMorphColorHex());

            for (let i = 0; i < currentNumShapes; i++) {
                shapeProperties[i].currentColorRgb = {...newColor};
                shapeProperties[i].targetColorRgb = {...newColor};
            }

            // --- UI UPDATE: Hide heavy UI elements during cluster phase ---
            document.getElementById("conspiracy").style.opacity = 0; // Fade out scroll box
            document.getElementById("truth-counter").style.opacity = 0; // Fade out counter
            document.getElementById("text-container").style.backgroundColor = "transparent"; // Remove dark band bg
            document.getElementById("text-container").style.borderTop = "none";
        }

        function startMorphToFace() {
            if (morphingToFace) return;
            morphingToFace = true;
            faceMorphStartTime = performance.now();
        }

        // --- Face state & drawing ---

        function updateFaceState() {
            if (!speakingFaceActive && !faceSmileMode && !morphingToFace) return;

            // Animate Face Alpha for smooth fade-in
            if (speakingFaceActive || morphingToFace) {
                if (faceAlpha < 1.0) faceAlpha += 0.01;
            } else {
                faceAlpha = 0;
            }

            faceCurrentColorRgb.r = interpolateColorValue(faceCurrentColorRgb.r, faceTargetColorRgb.r, FACE_COLOR_MORPH_SPEED);
            faceCurrentColorRgb.g = interpolateColorValue(faceCurrentColorRgb.g, faceTargetColorRgb.g, FACE_COLOR_MORPH_SPEED);
            faceCurrentColorRgb.b = interpolateColorValue(faceCurrentColorRgb.b, faceTargetColorRgb.b, FACE_COLOR_MORPH_SPEED);

            if (Math.random() < 0.01 && !faceSmileMode) {
                faceTargetColorRgb = hexToRgb(getRandomMorphColorHex());
            }

            if (!faceSmileMode) {
                if (speakingFaceActive) {
                    mouthOpenTimer--;
                    if (mouthOpenTimer <= 0) {
                        mouthOpenTarget = 0.15 + Math.random() * 0.75;
                        mouthOpenTimer = randomInt(3, 10);
                    }
                    faceMouthOpen += (mouthOpenTarget - faceMouthOpen) * 0.45;
                } else {
                    faceMouthPhase += 0.03;
                    const base = 0.2 + 0.2 * (0.5 + Math.sin(faceMouthPhase) * 0.5);
                    const jitter = (Math.random() - 0.5) * 0.03;
                    faceMouthOpen = Math.max(0.1, Math.min(0.6, base + jitter));
                }

                if (!faceIsBlinking) {
                    if (Math.random() < 0.01) {
                        faceIsBlinking = true;
                        faceBlinkDuration = randomInt(8, 18);
                        faceBlinkTimer = 0;
                    }
                } else {
                    faceBlinkTimer++;
                    if (faceBlinkTimer > faceBlinkDuration) {
                        faceIsBlinking = false;
                    }
                }

                if (Math.random() < 0.02) {
                    faceEyebrowTilt = randomFloat(-0.4, 0.4);
                    faceEyebrowLift = randomFloat(-0.08, 0.08);
                }
            } else {
                faceMouthOpen = 0.15;
                faceEyebrowTilt = 0;
                faceEyebrowLift = -0.05;
            }

            eyeGazeTimer--;
            if (eyeGazeTimer <= 0) {
                const gazeOptions = [
                    {x: -1, y: 0},
                    {x: 1, y: 0},
                    {x: -0.6, y: -0.3},
                    {x: 0.6, y: -0.3},
                    {x: 0, y: -0.5}
                ];
                const dir = getRandomElement(gazeOptions);
                const mag = randomFloat(0.3, 0.8);
                eyeGazeTarget.x = dir.x * mag;
                eyeGazeTarget.y = dir.y * mag;
                eyeGazeTimer = randomInt(80, 200);
            }
            eyeGazeCurrent.x += (eyeGazeTarget.x - eyeGazeCurrent.x) * 0.05;
            eyeGazeCurrent.y += (eyeGazeTarget.y - eyeGazeCurrent.y) * 0.05;
        }

        function drawFaceOverlay() {
            if (!speakingFaceActive && !faceSmileMode && !morphingToFace) return;

            const colorHex = rgbToHex(faceCurrentColorRgb.r, faceCurrentColorRgb.g, faceCurrentColorRgb.b);
            ctx.save();
            ctx.globalAlpha = faceAlpha; // Apply fade-in
            
            // Draw Solid Face Background (Opposite Color)
            const invR = 255 - faceCurrentColorRgb.r;
            const invG = 255 - faceCurrentColorRgb.g;
            const invB = 255 - faceCurrentColorRgb.b;
            ctx.fillStyle = `rgb(${invR},${invG},${invB})`;
            
            ctx.beginPath();
            ctx.arc(faceCenterX, faceCenterY, faceRadius, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw Face Outline & Features
            ctx.strokeStyle = colorHex;
            ctx.fillStyle = colorHex; // For pupils
            ctx.lineWidth = 3;
            ctx.stroke(); // Stroke the circle we just filled

            const eyeRadius = faceRadius * 0.13;
            const eyeOffsetX = faceRadius * 0.38;
            const eyeOffsetY = -faceRadius * 0.25;
            const leftEyeX = faceCenterX - eyeOffsetX;
            const rightEyeX = faceCenterX + eyeOffsetX;
            const eyeY = faceCenterY + eyeOffsetY;

            ctx.beginPath();
            if (!faceIsBlinking) {
                ctx.arc(leftEyeX, eyeY, eyeRadius, 0, Math.PI * 2);
                ctx.arc(rightEyeX, eyeY, eyeRadius, 0, Math.PI * 2);
            } else {
                ctx.moveTo(leftEyeX - eyeRadius, eyeY);
                ctx.lineTo(leftEyeX + eyeRadius, eyeY);
                ctx.moveTo(rightEyeX - eyeRadius, eyeY);
                ctx.lineTo(rightEyeX + eyeRadius, eyeY);
            }
            ctx.stroke();

            if (!faceIsBlinking) {
                const pupilRadius = eyeRadius * 0.45;
                const px = eyeGazeCurrent.x * pupilRadius;
                const py = eyeGazeCurrent.y * pupilRadius;
                ctx.beginPath();
                ctx.arc(leftEyeX + px, eyeY + py, pupilRadius, 0, Math.PI * 2);
                ctx.arc(rightEyeX + px, eyeY + py, pupilRadius, 0, Math.PI * 2);
                ctx.fill();
            }

            const eyebrowWidth = faceRadius * 0.4;
            const eyebrowHeight = faceRadius * 0.05;
            const eyebrowY = eyeY - faceRadius * (0.2 + faceEyebrowLift);
            const tilt = faceEyebrowTilt;

            function drawEyebrow(cx, sign) {
                const dx = eyebrowWidth / 2;
                const dy = eyebrowHeight * sign;
                ctx.beginPath();
                ctx.moveTo(
                    cx - dx * Math.cos(tilt),
                    eyebrowY - dy * Math.sin(tilt)
                );
                ctx.lineTo(
                    cx + dx * Math.cos(tilt),
                    eyebrowY + dy * Math.sin(tilt)
                );
                ctx.stroke();
            }

            drawEyebrow(leftEyeX, -1);
            drawEyebrow(rightEyeX, 1);

            const mouthY = faceCenterY + faceRadius * 0.35;
            const mouthWidth = faceRadius * 0.7;
            const mouthHeight = faceRadius * (0.05 + 0.18 * faceMouthOpen);

            ctx.beginPath();
            if (faceSmileMode) {
                ctx.moveTo(faceCenterX - mouthWidth / 2, mouthY);
                ctx.quadraticCurveTo(
                    faceCenterX,
                    mouthY + faceRadius * 0.12,
                    faceCenterX + mouthWidth / 2,
                    mouthY
                );
            } else {
                ctx.ellipse(faceCenterX, mouthY, mouthWidth / 2, mouthHeight, 0, 0, Math.PI * 2);
            }
            ctx.stroke();

            ctx.restore();
        }

    const relativeTop = el.offsetTop;
    container.scrollTo({
        top: relativeTop - (container.clientHeight / 2) + (el.clientHeight / 2),
        behavior: "smooth"
    });
}
                                
                                // Reveal Hidden Message Part
                                if(el.dataset.target === "true") {
                                    const rawText = el.dataset.text;
                                    el.classList.add("word-distilled");
                                    const placeholders = targetMap[rawText];
                                    if(placeholders) {
                                        placeholders.forEach(ph => {
                                            ph.textContent = el.innerText;
                                            ph.classList.remove("word-placeholder");
                                            ph.classList.add("word-distilled");
                                        });
                                    }
                                }
                            }
                        }, 
                        () => {
                            // On Complete: Say final line
                            setTimeout(() => {
                                speakConspiracy(
                                    "And that's the truth.",
                                    () => {
                                        // FINAL STAGE: White Screen, Full Text, Rising Tone
                                        document.body.classList.add('white-mode');
                                        
                                        // Force scroll to top
                                        const textContainer = document.getElementById("text-container");
                                        textContainer.scrollTop = 0;

                                        startShepherdTone();
                                        
                                        setTimeout(() => {
                                            stopShepherdTone();
                                            document.body.classList.remove('white-mode');
                                            
                                            // FLIP TO BLACK MODE
                                            document.body.classList.add('black-mode');
                                            
                                            // Explicitly Clear Distilled Text
                                            nonsenseElement.style.opacity = 0;

                                            setTimeout(() => {
                                                // Fade out text
                                                const conspiracyDiv = document.getElementById("conspiracy");
                                                conspiracyDiv.style.opacity = 0;

                                                setTimeout(() => {
                                                    document.body.classList.remove('black-mode');
                                                    document.body.classList.add('generating-mode');
                                                    
                                                    // SHOW GENERATING MESSAGE (Clean Screen)
                                                    const genMsg = document.getElementById('generating-message');
                                                    genMsg.style.display = 'block';
                                                    
                                                    setTimeout(() => {
                                                        genMsg.style.display = 'none';
                                                        document.body.classList.remove('generating-mode');
                                                        resetAfterPhase();
                                                    }, 6000); // Show message for 6s
                                                }, 1500); // Wait for fade
                                            }, 6000); // Stay black for 6s
                                        }, 10000); // Stay white for 10s
                                    },
                                    { voiceOverride: lastVoiceUsed }
                                );
                            }, 1000);
                        },
                        lastVoiceUsed
                    );
                }
            }

            ctx.shadowColor = SHADOW_COLOR;
            ctx.shadowBlur = SHADOW_BLUR;
            ctx.shadowOffsetX = SHADOW_OFFSET_X;
            ctx.shadowOffsetY = SHADOW_OFFSET_Y;

            for (let i = 0; i < currentNumShapes; i++) {
                const properties = shapeProperties[i];
                const points = currentPoints[i];

                if (speakingFaceActive) {
                    // SATELLITE MODE: Orbit the face center
                    properties.orbitAngle += properties.orbitSpeed;
                    const orbitX = faceCenterX + Math.cos(properties.orbitAngle) * properties.orbitRadius;
                    const orbitY = faceCenterY + Math.sin(properties.orbitAngle) * properties.orbitRadius * 0.8; // ellipse
                    
                    properties.targetCenterX = orbitX;
                    properties.targetCenterY = orbitY;
                    properties.centerMoveSpeed = 0.1; 
                    
                    // Maintain current color
                    properties.targetColorRgb = { ...faceCurrentColorRgb };
                } else {
                    // Normal behavior logic
                    properties.currentCenterX += (properties.targetCenterX - properties.currentCenterX) * properties.centerMoveSpeed;
                    properties.currentCenterY += (properties.targetCenterY - properties.currentCenterY) * properties.centerMoveSpeed;
                }
                
                // If in satellite mode, we still need to apply the move towards target
                if (speakingFaceActive) {
                     properties.currentCenterX += (properties.targetCenterX - properties.currentCenterX) * properties.centerMoveSpeed;
                     properties.currentCenterY += (properties.targetCenterY - properties.currentCenterY) * properties.centerMoveSpeed;
                }

                properties.currentScale += (properties.targetScale - properties.currentScale) * SCALE_MORPH_SPEED;
                properties.globalMorphSpeedFactor += (properties.targetGlobalMorphSpeedFactor - properties.globalMorphSpeedFactor) * 0.02;
                properties.currentColorRgb.r = interpolateColorValue(properties.currentColorRgb.r, properties.targetColorRgb.r, COLOR_MORPH_SPEED);
                properties.currentColorRgb.g = interpolateColorValue(properties.currentColorRgb.g, properties.targetColorRgb.g, COLOR_MORPH_SPEED);
                properties.currentColorRgb.b = interpolateColorValue(properties.currentColorRgb.b, properties.targetColorRgb.b, COLOR_MORPH_SPEED);
                const currentHexColor = rgbToHex(properties.currentColorRgb.r, properties.currentColorRgb.g, properties.currentColorRgb.b);

                const currentAgitationFactor = 1 + agitation * (MAX_AGITATION_FACTOR -1);

                let morphSuppression = 1;
                if (morphingToFace) {
                    morphSuppression = 1 - morphProgress;
                } else if (clusterToFacePhase) {
                    morphSuppression = 0.7;
                }

                let effectiveMorphSpeed = BASE_MORPH_SPEED * currentAgitationFactor * properties.globalMorphSpeedFactor;
                let effectiveNoiseAmplitude = MORPH_NOISE_AMPLITUDE * currentAgitationFactor * morphSuppression;

                if (speakingFaceActive) {
                    effectiveNoiseAmplitude *= 1.5; // less jitter for satellites
                    effectiveMorphSpeed *= 1.4;
                }

                // Handle Blink
                let alphaModifier = 1.0;
                if (properties.blinkState && properties.blinkState.count > 0) {
                    properties.blinkState.timer++;
                    if (properties.blinkState.timer > 5) { // Faster blink
                        properties.blinkState.active = !properties.blinkState.active;
                        properties.blinkState.count--;
                        properties.blinkState.timer = 0;
                    }
                    alphaModifier = properties.blinkState.active ? 1.0 : 0.0; 
                }

                let projectedPoints = [];
                for (let j = 0; j < NUM_MORPH_POINTS; j++) {
                    const p = points[j];
                    p.x += (p.targetX - p.x) * effectiveMorphSpeed;
                    p.y += (p.targetY - p.y) * effectiveMorphSpeed;
                    p.z += (p.targetZ - p.z) * effectiveMorphSpeed;
                    const noiseX = (Math.sin(time * 0.05 + p.noiseOffsetX) + Math.cos(time * 0.03 + j)) * effectiveNoiseAmplitude;
                    const noiseY = (Math.cos(time * 0.05 + p.noiseOffsetY) + Math.sin(time * 0.03 + j)) * effectiveNoiseAmplitude;
                    const noiseZ = (Math.sin(time * 0.04 + p.noiseOffsetZ)) * effectiveNoiseAmplitude * 2;
                    const currentZ = p.z + noiseZ;
                    const perspectiveFactor = Math.max(0.01, FOV / (FOV + currentZ + vanishingPointZ));
                    const worldX = properties.currentCenterX + (p.x + noiseX);
                    const worldY = properties.currentCenterY + (p.y + noiseY);
                    const displayX = (worldX - canvasCenterX) * perspectiveFactor * properties.currentScale + canvasCenterX;
                    const displayY = (worldY - canvasCenterY) * perspectiveFactor * properties.currentScale + canvasCenterY;
                    projectedPoints.push({ x: displayX, y: displayY, z: currentZ });
                }

                let baseAlpha = 0.5;
                if (projectedPoints.length > 0) {
                    let totalZForShape = 0;
                    projectedPoints.forEach(p_ => totalZForShape += p_.z);
                    const avgZForShape = totalZForShape / projectedPoints.length;
                    const depthRatioForShape = Math.max(0, Math.min(1, (avgZForShape + zRange / 2) / zRange));
                    baseAlpha = 0.5 + (1 - depthRatioForShape) * 0.5;
                }
                // combine depth alpha with blink alpha
                ctx.globalAlpha = baseAlpha * alphaModifier;

                ctx.beginPath();
                if (properties.drawingStyle === 'angular') {
                    if (projectedPoints.length > 0) {
                        ctx.moveTo(projectedPoints[0].x, projectedPoints[0].y);
                        for (let j = 1; j < NUM_MORPH_POINTS; j++) {
                            ctx.lineTo(projectedPoints[j].x, projectedPoints[j].y);
                        }
                        ctx.closePath();
                    }
                } else {
                    if (projectedPoints.length >= 3) {
                        ctx.moveTo(
                            (projectedPoints[projectedPoints.length - 1].x + projectedPoints[0].x) / 2,
                            (projectedPoints[projectedPoints.length - 1].y + projectedPoints[0].y) / 2
                        );
                        for (let k = 0; k < projectedPoints.length; k++) {
                            ctx.quadraticCurveTo(
                                projectedPoints[k].x,
                                projectedPoints[k].y,
                                (projectedPoints[k].x + projectedPoints[(k + 1) % projectedPoints.length].x) / 2,
                                (projectedPoints[k].y + projectedPoints[(k + 1) % projectedPoints.length].y) / 2
                            );
                        }
                        ctx.closePath();
                    }
                }

                if (speakingFaceActive) {
                    ctx.fillStyle = currentHexColor;
                    ctx.fill();
                } else {
                    ctx.strokeStyle = currentHexColor;
                    ctx.lineWidth = FIXED_SHAPE_LINE_WIDTH;
                    ctx.stroke();
                }
                
                ctx.globalAlpha = 1.0;
            }

            ctx.shadowColor = "transparent";
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;

            if (agitation > 0) {
                agitation -= AGITATION_DECAY;
                if (agitation < 0) agitation = 0;
            }
            time += 1;

            if (!shapeBehaviorLock &&
                performance.now() - lastTargetChangeTime > MORPH_TARGET_CHANGE_INTERVAL &&
                !morphingToFace &&
                !clusterToFacePhase
            ) {
                generateNewTargetPointSet();
            }

            updateFaceState();
            drawFaceOverlay();

            animationFrameId = requestAnimationFrame(updateAndDrawMorphingOutline);
        }

        function resetAfterPhase() {
            speakingFaceActive = false;
            morphingToFace = false;
            clusterToFacePhase = false;
            finalRevealTrigger = false;
            finalRevealStarted = false;
            preRevealStarted = false;
            shapeBehaviorLock = false;
            faceSmileMode = false;

            cumulativeConspiracy = "";
            conspiracyDisplay.textContent = "";
            recentConspiracyDisplay.textContent = "";
            nonsenseElement.textContent = "";
            nonsenseElement.style.opacity = 0;

            distilledWordsList = [];

            // Reset Styles for Normal Mode
            recentConspiracyDisplay.style.opacity = '1';
            thinkingDisplay.style.opacity = '1';
            
            textContainerElement.style.opacity = 1;
            textContainerElement.style.backgroundColor = 'rgba(0,0,0,0.75)';
            textContainerElement.style.borderTop = '1px solid #333';
            
            conspiracyDisplay.style.backgroundColor = 'rgba(10,10,10,0.85)';
            conspiracyDisplay.style.border = '1px solid #444';
            conspiracyDisplay.classList.remove('final-mode');
            conspiracyDisplay.style.opacity = 0.8; // Match original opacity

            truthCounterDisplay.style.opacity = 1;

            stopNonsenseSentence();

            resetSnippetSequence();
            initializeAndResetShapes();
            startDayCounter();
            mainLoop();
        }

        // --- Resize & init ---

        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            if (!container) return;
            const availableWidth = container.clientWidth;
            const availableHeight = container.clientHeight;
            if (!initialResizeDone || Math.abs(canvas.width - availableWidth) > 5 || Math.abs(canvas.height - availableHeight) > 5 ) {
                canvas.width = availableWidth;
                canvas.height = availableHeight;
                canvasCenterX = canvas.width / 2;
                canvasCenterY = canvas.height / 2;

                const minDim = Math.min(canvas.width, canvas.height);
                faceCenterX = canvasCenterX;
                faceCenterY = canvasCenterY * 0.65; // lower on screen
                faceRadius = minDim * 0.28;

                initializeAndResetShapes();
                if (!initialResizeDone) initialResizeDone = true;
            }
        }
        window.addEventListener('resize', resizeCanvas);

        // --- Voices ---

        function populatePreferredVoices() {
            const allVoices = window.speechSynthesis.getVoices();
            if (allVoices.length === 0) return;

            const englishVoices = allVoices.filter(voice => voice.lang.startsWith("en"));
            const maleEnglishVoices = [];
            const otherEnglishVoices = [];
            const otherNonEnglishVoices = [];

            englishVoices.forEach(voice => {
                const nameLower = voice.name.toLowerCase();
                const isMale = (voice.gender && voice.gender.toLowerCase() === 'male') ||
                               maleVoiceKeywords.some(keyword => nameLower.includes(keyword));
                if (isMale) {
                    maleEnglishVoices.push(voice);
                } else {
                    otherEnglishVoices.push(voice);
                }
            });

            allVoices.forEach(voice => {
                if (!voice.lang.startsWith("en")) {
                    otherNonEnglishVoices.push(voice);
                }
            });

            preferredVoicesList = [...maleEnglishVoices, ...otherEnglishVoices, ...otherNonEnglishVoices];
        }

        window.onload = function() {
            thinkingDisplay.textContent = "thinking...";
            thinkingDisplay.style.color = THINKING_COLOR;
            thinkingDisplay.classList.add("blink");

            const initialWidth = canvas.width || window.innerWidth;
            const initialHeight = canvas.height || window.innerHeight;
            globalThis.convergencePoint = { x: initialWidth / 2, y: initialHeight * 0.35 };
            targetUnifiedConvergencePoint = { x: initialWidth / 2, y: initialHeight * 0.5 };
            unifiedConvergencePoint = { x: initialWidth / 2, y: initialHeight * 0.5 };
            targetUnifiedShapeColorRgb = hexToRgb(getRandomMorphColorHex());
            unifiedShapeColorRgb = {...targetUnifiedShapeColorRgb};

            initializeBackgroundMorph();
            resetSnippetSequence();
            resizeCanvas();
            animationFrameId = requestAnimationFrame(updateAndDrawMorphingOutline);
            startDayCounter();

            if (typeof speechSynthesis === 'undefined') {
                voicesLoaded = true;
                mainLoop();
                return;
            }

            const attemptLoadVoices = () => {
                populatePreferredVoices();
                voicesLoaded = true;
                mainLoop();
            };

            const initialVoices = window.speechSynthesis.getVoices();
            if (initialVoices.length > 0) {
                attemptLoadVoices();
            } else {
                window.speechSynthesis.onvoiceschanged = () => {
                    if (!voicesLoaded) attemptLoadVoices();
                };
                setTimeout(() => {
                    if (!voicesLoaded) attemptLoadVoices();
                }, 2000);
            }
        };
    </script>
